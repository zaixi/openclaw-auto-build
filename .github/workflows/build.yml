name: Build and Push Custom OpenClaw Image

on:
  schedule:
    # 每天检查一次更新
    - cron: '0 2 * * *'
  # 也支持手动触发
  workflow_dispatch:
  # 监听上游新 release 就触发
  repository_dispatch:
    types: [upstream-release]

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/openclaw-custom
  APT_PACKAGES: git curl jq ffmpeg

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Fetch latest version
        id: version
        run: |
          UPSTREAM_VERSION=$(curl -s https://api.github.com/repos/openclaw/openclaw/releases/latest | jq -r '.tag_name // "latest"')
          echo "VERSION=${UPSTREAM_VERSION#v}" >> $GITHUB_OUTPUT
          echo "Full tag: $UPSTREAM_VERSION"

      - name: Clone openclaw source
        run: |
          git clone --depth 1 --branch ${{ steps.version.outputs.VERSION }} \
            https://github.com/openclaw/openclaw.git openclaw-source

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./openclaw-source
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.VERSION }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          build-args: |
            OPENCLAW_DOCKER_APT_PACKAGES=${{ env.APT_PACKAGES }}
            OPENCLAW_EXTENSIONS=

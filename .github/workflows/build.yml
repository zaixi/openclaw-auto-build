name: Build and Push OpenClaw Image

on:
  schedule:
    # 每6小时检查一次上游更新，有更新才构建（北京时间 02:00/08:00/14:00/20:00）
    - cron: '0 2,8,14,20 * * *'
  workflow_dispatch:
    inputs:
      version:
        description: 'openclaw npm 版本（如 2026.4.9），留空则自动检测'
        required: false
      force:
        description: '强制构建（忽略版本检测）'
        required: false
        default: 'false'
  repository_dispatch:
    types: [upstream-release]

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/openclaw
  GHCR_REGISTRY: ghcr.io
  GHCR_IMAGE_NAME: ${{ github.repository_owner }}/openclaw

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.check.outputs.new_version }}
      has_update: ${{ steps.check.outputs.has_update }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check openclaw npm version
        id: check
        run: |
          python3 << 'PYEOF'
          import urllib.request, json, os

          # 获取 openclaw npm 最新版本
          try:
              with urllib.request.urlopen('https://registry.npmjs.org/openclaw/latest', timeout=10) as r:
                  upstream = json.loads(r.read())['version']
          except Exception as e:
              print(f'Failed to fetch npm version: {e}', flush=True)
              exit(1)
          print(f'NPM latest openclaw: {upstream}', flush=True)

          version_input = os.getenv('INPUT_VERSION', '')
          force = os.getenv('INPUT_FORCE', 'false')

          if version_input:
              print(f'Manually specified version: {version_input}', flush=True)
              with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                  f.write(f'has_update=true\nnew_version={version_input}\n')
              exit(0)

          if force == 'true':
              print('Force build enabled', flush=True)
              with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                  f.write(f'has_update=true\nnew_version={upstream}\n')
              exit(0)

          # 检查 Docker Hub 已有的最新版本
          dh_version = '0.0.0'
          try:
              req = urllib.request.Request(
                  'https://registry.hub.docker.com/v2/repositories/${{ secrets.DOCKERHUB_USERNAME }}/openclaw/tags?page_size=100',
                  headers={'Accept': 'application/json'}
              )
              with urllib.request.urlopen(req, timeout=10) as r:
                  data = json.loads(r.read())
                  tags = [t['name'] for t in data.get('results', []) if t['name'] not in ('latest', 'main')]
                  # 找 semver 格式的 tag
                  import re
                  semver_tags = [t for t in tags if re.match(r'^\d+\.\d+\.\d+', t)]
                  if semver_tags:
                      semver_tags.sort(key=lambda x: [int(p) for p in x.split('.')])
                      dh_version = semver_tags[-1]
          except Exception as e:
              print(f'Docker Hub API error (assuming empty): {e}', flush=True)
          print(f'Docker Hub latest: {dh_version}', flush=True)

          def parse_ver(v):
              return [int(p) for p in v.split('.') if p.isdigit()]
          has_update = parse_ver(dh_version) < parse_ver(upstream)
          print(f'has_update={str(has_update).lower()}', flush=True)
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'has_update={str(has_update).lower()}\nnew_version={upstream}\n')
          PYEOF

      - name: Report
        run: |
          echo "${{ steps.check.outputs.has_update == 'true' && format('Update available: {0} → will build', steps.check.outputs.new_version) || 'Already up-to-date, skipping build' }}"

  build:
    needs: check
    if: needs.check.outputs.has_update == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read build.conf
        id: conf
        run: |
          python3 << 'PYEOF'
          import re, os
          with open('build.conf') as f:
              for line in f:
                  line = line.strip()
                  if not line or line.startswith('#'):
                      continue
                  m = re.match(r'^(OPENCLAW_[A-Z_]+)="(.*)"$', line)
                  if m:
                      key, val = m.group(1), m.group(2).strip()
                      with open(os.environ['GITHUB_OUTPUT'], 'a') as out:
                          out.write(f'{key}={val}\n')
                      print(f'{key}={val}')
          PYEOF

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push to Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.check.outputs.new_version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          build-args: |
            OPENCLAW_NPM_PACKAGES=${{ steps.conf.outputs.OPENCLAW_NPM_PACKAGES }}
            OPENCLAW_NPM_REGISTRY=${{ steps.conf.outputs.OPENCLAW_NPM_REGISTRY }}
            OPENCLAW_PIP_INDEX_URL=${{ steps.conf.outputs.OPENCLAW_PIP_INDEX_URL }}
            OPENCLAW_SEED_EXTENSIONS=${{ steps.conf.outputs.OPENCLAW_SEED_EXTENSIONS }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push to GitHub Container Registry
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_IMAGE_NAME }}:${{ needs.check.outputs.new_version }}
          build-args: |
            OPENCLAW_NPM_PACKAGES=${{ steps.conf.outputs.OPENCLAW_NPM_PACKAGES }}
            OPENCLAW_NPM_REGISTRY=${{ steps.conf.outputs.OPENCLAW_NPM_REGISTRY }}
            OPENCLAW_PIP_INDEX_URL=${{ steps.conf.outputs.OPENCLAW_PIP_INDEX_URL }}
            OPENCLAW_SEED_EXTENSIONS=${{ steps.conf.outputs.OPENCLAW_SEED_EXTENSIONS }}
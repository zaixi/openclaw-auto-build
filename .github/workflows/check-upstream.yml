name: Check Upstream Release

on:
  schedule:
    # 每6小时检查一次上游更新
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.check.outputs.new_version }}
      has_update: ${{ steps.check.outputs.has_update }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check upstream release
        id: check
        run: |
          # 获取上游最新版本
          UPSTREAM_VERSION=$(curl -s https://api.github.com/repos/openclaw/openclaw/releases/latest | jq -r '.tag_name')
          echo "Upstream latest: $UPSTREAM_VERSION"

          # 读取 Docker Hub 上已发布的最新版本
          DH_VERSION=$(curl -s "https://registry.hub.docker.com/v2/repositories/${{ secrets.DOCKERHUB_USERNAME }}/openclaw/tags?page_size=100" | \
            jq -r '.results[].name' | grep -v '^latest$' | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' | \
            sort -V | tail -1)
          echo "Docker Hub latest: $DH_VERSION"

          # 比较 Docker Hub 版本与上游最新版本
          if [ "$(printf '%s\n' "$DH_VERSION" "$UPSTREAM_VERSION" | sort -V | head -n1)" != "$UPSTREAM_VERSION" ] && [ -n "$UPSTREAM_VERSION" ]; then
            echo "has_update=true"
            echo "new_version=${UPSTREAM_VERSION#v}" >> $GITHUB_OUTPUT
          else
            echo "has_update=false"
            echo "new_version=${UPSTREAM_VERSION#v}" >> $GITHUB_OUTPUT
          fi

      - name: Trigger build on new version
        if: steps.check.outputs.has_update == 'true'
        run: |
          echo "New version detected: ${{ steps.check.outputs.new_version }}"
          curl -s -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/build.yml/dispatches \
            -d '{"ref":"main","inputs":{"version":"${{ steps.check.outputs.new_version }}"}}'
          echo "Build triggered!"

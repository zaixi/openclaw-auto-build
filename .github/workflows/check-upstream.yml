name: Check Upstream Release

on:
  schedule:
    # 每小时检查一次上游更新（比每天更及时）
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.check.outputs.new_version }}
      has_update: ${{ steps.check.outputs.has_update }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check upstream release
        id: check
        run: |
          # 获取上游最新版本
          UPSTREAM_VERSION=$(curl -s https://api.github.com/repos/openclaw/openclaw/releases/latest | jq -r '.tag_name')
          echo "Upstream latest: $UPSTREAM_VERSION"
          
          # 读取本地缓存的版本（如果没有则设为空）
          CACHED_VERSION=""
          if [ -f .upstream-version ]; then
            CACHED_VERSION=$(cat .upstream-version)
          fi
          echo "Cached version: $CACHED_VERSION"
          
          # 比较
          if [ "$UPSTREAM_VERSION" != "$CACHED_VERSION" ] && [ -n "$UPSTREAM_VERSION" ]; then
            echo "has_update=true"
            echo "new_version=$UPSTREAM_VERSION"
            echo "$UPSTREAM_VERSION" > .upstream-version
          else
            echo "has_update=false"
            echo "new_version=$UPSTREAM_VERSION"
            echo "$UPSTREAM_VERSION" > .upstream-version
          fi

      - name: Trigger build on new version
        if: steps.check.outputs.has_update == 'true'
        run: |
          echo "New version detected: ${{ steps.check.outputs.new_version }}"
          curl -s -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/zaixi/openclaw-auto-build/actions/workflows/build.yml/dispatches \
            -d '{"ref":"main"}'
          echo "Build triggered!"
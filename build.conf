# OpenClaw 自定义镜像构建配置
# https://github.com/zaixi/openclaw-auto-build

# 额外的 apt 包（空格分隔）
OPENCLAW_DOCKER_APT_PACKAGES="git curl jq ffmpeg"

# 预装的扩展名（空格分隔）
OPENCLAW_EXTENSIONS=""

# 是否安装 Docker CLI（sandbox 需要）
OPENCLAW_INSTALL_DOCKER_CLI="1"

# 是否安装 Chromium 浏览器（browser automation 需要）
OPENCLAW_INSTALL_BROWSER="1"

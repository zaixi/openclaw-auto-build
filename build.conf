# OpenClaw 自定义镜像构建配置
# https://github.com/zaixi/openclaw-auto-build

# ──────────────── apt 包 ────────────────
# 空格分隔的基础工具包（包含 docker-ce-cli docker-compose-plugin chromium 等可选依赖）
OPENCLAW_APT_PACKAGES="bash build-essential ca-certificates chromium curl ffmpeg fonts-liberation fonts-noto-cjk fonts-noto-color-emoji git gosu gnupg jq locales openssh-client procps python3 python3-pip python3-venv socat tini unzip tzdata"

# ──────────────── npm 全局包 ────────────────
# 空格分隔，留空则不安装额外包
OPENCLAW_NPM_PACKAGES="clawhub claude-code opencode-ai playwright playwright-extra puppeteer-extra-plugin-stealth"

# ──────────────── pip 包 ────────────────
# 通过 pip 安装的 Python 包（空格分隔），如 websockify nova
OPENCLAW_PIP_PACKAGES=""

# ──────────────── 扩展 ────────────────
# 预装的 openclaw 扩展名（空格分隔），如 openclaw-tavily openclaw-qqbot
# 在容器每次启动时检查安装（不在镜像构建时装）
OPENCLAW_EXTENSIONS=""

# ──────────────── 镜像加速 ────────────────
# npm registry（留空则使用官方 registry）
OPENCLAW_NPM_REGISTRY="https://registry.npmmirror.com"
# pip/pypi 镜像（留空则使用官方 pypi.org）
OPENCLAW_PIP_INDEX_URL="https://pypi.npmmirror.com"

# OpenClaw 自定义镜像构建配置
# https://github.com/zaixi/openclaw-auto-build

# ──────────────── apt 包 ────────────────
OPENCLAW_APT_PACKAGES="bash build-essential ca-certificates chromium curl ffmpeg fonts-liberation fonts-noto-cjk fonts-noto-color-emoji git gosu jq locales openssh-client procps python3 python3-pip python3-venv socat tini unzip tzdata docker.io"

# ──────────────── npm 全局包 ────────────────
OPENCLAW_NPM_PACKAGES="clawhub claude-code opencode-ai playwright playwright-extra puppeteer-extra-plugin-stealth"

# ──────────────── pip 包 ────────────────
OPENCLAW_PIP_PACKAGES="websockify"

# ──────────────── 预装扩展（构建时 seed，容器启动时同步）───────────────
OPENCLAW_SEED_EXTENSIONS="@tencent-weixin/openclaw-weixin-cli @tencent-connect/openclaw-qqbot napcat dingtalk"

# ──────────────── 镜像加速 ────────────────
OPENCLAW_NPM_REGISTRY="https://registry.npmmirror.com"
OPENCLAW_PIP_INDEX_URL="https://pypi.npmmirror.com"